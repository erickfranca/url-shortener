server.port=8084

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Lida via variável de ambiente APP_ENVIRONMENT (Spring converte automaticamente
# APP_ENVIRONMENT -> app.environment). No Kubernetes, isso normalmente vem de um
# ConfigMap injetado como env var no Deployment.
app.environment=${APP_ENVIRONMENT:local}
