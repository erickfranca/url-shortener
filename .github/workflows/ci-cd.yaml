name: CI/CD url-shortener

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout url-shortener
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build com Maven
        run: mvn package -DskipTests -B

      - name: Definir tag da imagem
        id: vars
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      #nexus_step

      - name: Login no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest
      #CD
      - name: Checkout manifests-repo
        uses: actions/checkout@v7
        with:
          repository: erickfranca/manifests-repo
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          path: manifests-repo

      - name: Atualizar tag da imagem no values.yaml
        run: |
          cd manifests-repo
          sed -i "s/tag: .*/tag: \"${{ steps.vars.outputs.tag }}\"/" charts/url-shortener/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/url-shortener/values.yaml
          git commit -m "deploy: atualiza imagem para ${{ steps.vars.outputs.tag }}"
          git push